name: Compile Liaotian

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Copy java.zip from remote server
        env:
          SSH_USER: ${{ secrets.USER }}
          SSH_HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          # Prepare SSH key
          mkdir -p ~/.ssh
          echo "$SSH_USER"
          echo "$SSH_HOST"
          echo "SSH_KEY"
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Install dependencies
        run: npm install

      - name: Install others
        run: npm install @babel/plugin-proposal-nullish-coalescing-operator @babel/plugin-proposal-optional-chaining --save-dev

      - name: Build frontend
        run: npm run build

      - name: Deploy frontend
        env:
          SSH_USER: ${{ secrets.USER }}
          SSH_HOST: ${{ secrets.HOST }}
        run: |
          scp -i ~/.ssh/id_rsa -r  dist/*  ${{ secrets.USER }}@${{ secrets.HOST }}:/ecommerce/consumer/dist/

